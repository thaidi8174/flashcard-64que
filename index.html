<title>Flashcard 64 Quẻ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;color:#fff;min-height:100vh;overscroll-behavior:none;}
#app{max-width:480px;margin:0 auto;padding:0 0 2rem;}
.screen{padding:1rem 1rem 0;}

/* BUTTONS */
button{font-family:inherit;cursor:pointer;}
.btn-back{background:transparent;border:none;font-size:24px;color:rgba(255,255,255,0.5);padding:0;line-height:1;}
.btn-grade{flex:1;padding:14px 4px;border-radius:10px;background:transparent;font-size:16px;font-weight:500;}
.btn-know{border:1px solid rgba(93,202,165,0.5);color:#5DCAA5;}
.btn-know:active{background:rgba(93,202,165,0.15);}
.btn-dk{border:1px solid rgba(240,149,149,0.5);color:#F09595;}
.btn-dk:active{background:rgba(240,149,149,0.15);}
.btn-start{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:500;transition:background 0.2s;}

/* CARDS */
.card{border-radius:18px;border:1px solid rgba(255,255,255,0.15);background:#2a2a2a;min-height:390px;display:flex;flex-direction:column;margin-bottom:14px;overflow:hidden;cursor:pointer;user-select:none;-webkit-user-select:none;}
.card-front{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.75rem;}
.card-back{flex:1;overflow-y:auto;padding:1.75rem;}
.hao-wrap{display:flex;flex-direction:column;gap:11px;align-items:center;}
.hao-yang{width:88px;height:9px;background:#fff;border-radius:4px;}
.hao-yin{width:88px;display:flex;justify-content:space-between;}
.hao-yin span{width:38px;height:9px;background:#fff;border-radius:4px;display:block;}

/* PROGRESS */
.prog-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:14px;overflow:hidden;}
.prog-fill{height:100%;background:rgba(255,255,255,0.3);border-radius:2px;transition:width 0.3s;}

/* SEARCH */
.search-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;font-size:17px;outline:none;font-family:inherit;}
.search-item{padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:#2a2a2a;cursor:pointer;margin-bottom:8px;}
.search-detail{padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);margin-top:4px;margin-bottom:8px;}

/* GROUP SELECT */
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.group-item{padding:0.9rem 1rem;border-radius:12px;cursor:pointer;}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,0.3);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;}

/* MENU */
.menu-item{padding:1.25rem 1.5rem;border-radius:14px;background:#2a2a2a;margin-bottom:12px;cursor:pointer;}
.menu-item:active{background:#333;}

/* DONE */
.done-btn{width:100%;padding:14px;border-radius:12px;font-size:16px;font-family:inherit;cursor:pointer;margin-bottom:10px;}

/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.popup-sheet{background:#232323;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:82vh;display:flex;flex-direction:column;animation:slideUp 0.22s ease;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.popup-header{display:flex;align-items:flex-start;justify-content:space-between;padding:1.25rem 1.25rem 0.75rem;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
.popup-body{overflow-y:auto;padding:1.25rem;flex:1;}
.popup-close{background:rgba(255,255,255,0.1);border:none;width:30px;height:30px;border-radius:50%;font-size:16px;color:rgba(255,255,255,0.7);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
</style>
</head>

<script>
const QUE_ALL = [
  {so:11,name:`Thuần Kiền`,dong1:`Kiện dã. CHÍNH YẾU.`,chiTuong:`Nguyên Hanh Lợi Trinh chi tượng: tượng vạn vật có khởi đầu, lớn lên, toại chí, hoá thành.`,tuKhoa:`Cứng mạnh, khô, lớn, khoẻ mạnh, đức không nghỉ. Nguyên động lực, mạnh mẽ, dẻo dai, bền bỉ, chính yếu, cao lớn, liền lạc, tròn đầy, ngay đúng, nghiêm chỉnh, khô cứng, trong sáng, hiện rõ, hoàn thành, như nhiên.`,lines:[1, 1, 1, 1, 1, 1]},
  {so:12,name:`Thiên Trạch Lý`,dong1:`Lễ dã. LỘ HÀNH.`,chiTuong:`Hổ lang đan đạo chi tượng: tượng hổ lang đón đường.`,tuKhoa:`Nghi lễ, có chừng mực, khuôn phép, dẫm lên, không cho đi sai, có ý chận đường sái quá, hệ thống, pháp lý. Di chuyển, đường đi, hệ thống, quy củ, khuôn phép, chừng mực, lễ nghi, pháp lý, chặn đường, dẫm đạp.`,lines:[1, 1, 0, 1, 1, 1]},
  {so:13,name:`Thiên Hoả Đồng Nhân`,dong1:`Thân dã. THÂN THIỆN.`,chiTuong:`Hiệp lực đồng tâm chi tượng: tượng cùng người hiệp lực.`,tuKhoa:`Trên dưới cùng lòng, cùng người ưa thích, cùng một bọn người. Nhau, gần nhau, cùng nhau, thống nhất, đồng thời, thành một, quen thuộc, quen hơi.`,lines:[1, 0, 1, 1, 1, 1]},
  {so:14,name:`Thiên Lôi Vô Vọng`,dong1:`Thiên tai dã. XÂM LẤN.`,chiTuong:`Cương tự ngoại lai chi tượng: tượng kẻ mạnh từ ngoài đến.`,tuKhoa:`Tại vạ, lỗi bậy bạ, không lề lối, không quy cũ, càn đại, chống đối, hứng chịu. Tai hoạ từ trên từ ngoài đến, xâm lấn, xâm lăng, càn đại, không quy củ, hứng chịu, đi ẩu, càn bậy, bậy bạ, không mong được.`,lines:[1, 0, 0, 1, 1, 1]},
  {so:15,name:`Thiên Phong Cấu`,dong1:`Ngộ dã. TƯƠNG NGỘ.`,chiTuong:`Phong vân bất trắc chi tượng: gặp gỡ thình lình, ít khi.`,tuKhoa:`Gặp gỡ, cấu kết, liên kết, kết hợp, móc nối, mềm gặp cứng. Gặp gỡ, thình lình, ít khi, tương ngộ, bất ngờ không hẹn trước, cấu kết, móc nối, giao cấu, liên kết, kết hợp, mềm gặp cứng, đeo bám theo, dính vào.`,lines:[0, 1, 1, 1, 1, 1]},
  {so:16,name:`Thiên Thuỷ Tụng`,dong1:`Luận dã. BẤT HOÀ.`,chiTuong:`Đại tiểu bất hoà chi tượng: lớn nhỏ bất hoà.`,tuKhoa:`Bàn cãi, kiện tụng, bàn tính, cãi vã, tranh luận, bàn luận. Lớn nhỏ không đều, bất hoà, tranh chấp, tranh cãi, va chạm, đánh nhau, phát ra tiếng không đều.`,lines:[0, 1, 0, 1, 1, 1]},
  {so:17,name:`Thiên Sơn Độn`,dong1:`Thoái dã. ẨN TRÁ.`,chiTuong:`Báo ẩn Nam sơn chi tượng: tượng con báo ẩn ở núi Nam.`,tuKhoa:`Lui, ẩn khuất, tránh dời, lừa dối, trá hình, có ý trốn tránh, trốn cái mặt đưa thấy cái lưng. Thoái lui, lùi sau, bỏ trốn, ẩn núp, trá hình, ẩn trá, trốn tránh, độn thổ, bỏ chỗ, trộn lẫn, gò cao.`,lines:[0, 0, 1, 1, 1, 1]},
  {so:18,name:`Thiên Địa Bĩ`,dong1:`Tắc dã. GIÁN CÁCH.`,chiTuong:`Thượng hạ tiếm loạn chi tượng: tượng trên dưới lôi thôi.`,tuKhoa:`Bế tắc, không thông, không tương cảm nhau, xui xẻo, dèm pha, chê bai lẫn nhau, mạnh ai nấy theo ý riêng. Có khoảng cách, cách xa, gián đoạn, không thông, bế tắc, không tương cảm nhau, gièm pha, chê bai, theo ý riêng, lôi thôi, rối loạn, tranh đua.`,lines:[0, 0, 0, 1, 1, 1]},
  {so:21,name:`Trạch Thiên Quải`,dong1:`Quyết dã. DỨT KHOÁT.`,chiTuong:`Ích chi cực tắc quyết chi tượng: lợi đã cùng ắt thôi.`,tuKhoa:`Dứt hết, biên cương, ranh giới, thành phần, thành khoảnh, quyết định, quyết nghị, cổ phần, thôi, khai lề lối. Dứt khoát, thôi, hết, quyết định, quyết nghị, biên cương, ranh giới, thành khoảnh, khai lề lối, rạch đường, phân ranh, từng phần, đoạn, khúc, miếng, mảnh, cưa xẻ, cắt, chặt đứt, hết mức, hết sức.`,lines:[1, 1, 1, 1, 1, 0]},
  {so:22,name:`Thuần Đoài`,dong1:`Duyệt dã. HIỆN ĐẸP.`,chiTuong:`Hỉ dật mi tự chi tượng: tượng vui hiện trên mặt, khẩu khí.`,tuKhoa:`Đẹp đẽ, ưa thích, vui hiện trên mặt, không buồn chán, cười nói, khuyết mẻ. Hiện đẹp, hiển lộ, hé mở, đẹp đẽ, ưa thích, vui hiện trên mặt, cười nói, cửa miệng, khẩu khí, lịch duyệt, khuyết mẻ, vừa độ.`,lines:[1, 1, 0, 1, 1, 0]},
  {so:23,name:`Trạch Hoả Cách`,dong1:`Cải dã. CẢI BIẾN.`,chiTuong:`Thiên uyên huyền cách chi tượng: tượng vực Trời xa thẳm`,tuKhoa:`Bỏ lối cũ, cải cách, hoán cải, cách tuyệt, cánh chim thay lông. Cải cách, cải biến, sửa đổi, thay đổi, bỏ lối cũ, hoán cải, cải tiến, cách mạng, thay da đổi thịt, cánh chim thay lông, xa cách, cách tuyệt, xa thẳm.`,lines:[1, 0, 1, 1, 1, 0]},
  {so:24,name:`Trạch Lôi Tuỳ`,dong1:`Thuận dã. DI ĐỘNG.`,chiTuong:`Phản phúc bất định chi tượng: loại không ở.`,tuKhoa:`Cùng theo, mặc lòng, không có chí hướng, chỉ chiều theo, đại thể chủ việc di động, thuyên chuyển như chiếc xe. Thuận lòng, tuỳ thuộc, lệ thuộc, tuỳ tùng, chạy theo, hùa theo, chiều theo, không chí hướng, mặc lòng, mặc tình, di động, di chuyển, cùng theo (âm theo dương, dương theo âm), trơn trợt, đưa đẩy, không bám víu, không vướng mắc, dễ thay đổi, loại không ở.`,lines:[1, 0, 0, 1, 1, 0]},
  {so:25,name:`Trạch Phong Đại Quá`,dong1:`Hoạ dã. CẢ QUÁ.`,chiTuong:`Nộn thảo kinh sương chi tượng: tượng cỏ non bị sương tuyết.`,tuKhoa:`Cả quá ắt tai hoạ, quá mực thường, quá nhiều, giàu cương nghị ở trong. Quá cỡ, quá đáng, cả quá, quá nhiều, giàu cương nghị bên trong, nóng nảy, bực bội, tức giận, nóng sốt, sưng phồng, kích động, phấn kích cực độ, phun trào, tràn trề.`,lines:[0, 1, 1, 1, 1, 0]},
  {so:26,name:`Trạch Thuỷ Khốn`,dong1:`Nguy dã. NGUY LO.`,chiTuong:`Thủ kỷ đãi thời chi tượng: tượng giữ mình đợi thời.`,tuKhoa:`Cùng quẫn, bị người làm ách, lo lắng, cùng khổ, mệt mỏi, nguy cấp, lo hiểm nạn. Khốn quẫn, cùng khổ, nguy lo, hiểm nạn, bị người làm ách, nguy cấp, căng thẳng, khô cạn, thiếu thốn, lo lắng, mệt mỏi.`,lines:[0, 1, 0, 1, 1, 0]},
  {so:27,name:`Trạch Sơn Hàm`,dong1:`Cảm dã. THỤ CẢM.`,chiTuong:`Nam nữ giao cảm chi tượng: tượng nam nữ có tình ý.`,tuKhoa:`Cảm xúc, thọ nhận, cảm ứng, nghĩ đến nghe thấy, xúc động. Tương cảm, cảm xúc, cảm mến, cảm tình, thụ cảm, giao cảm, nhạy cảm, xúc động, thọ nhận, tiếp thu, tiếp nhận, hàm chứa, lưu giữ, hứng chịu, nghĩ đến, nghe thấy, thẩm thấu, nam nữ có tình ý.`,lines:[0, 0, 1, 1, 1, 0]},
  {so:28,name:`Trạch Địa Tuỵ`,dong1:`Tụ dã. TRƯNG TẬP.`,chiTuong:`Long vân tế hội chi tượng: tượng rồng mây giao hội.`,tuKhoa:`Nhóm họp, biểu tình, dồn đống, quần tụ nhau lại, kéo đến, kéo thành bầy. Tụ tập, tụ họp, nhóm họp, trưng tập, kêu gọi đến, kéo đến, kéo thành bầy, dồn đống, quần tụ nhau lại, cư trú ở một chỗ.`,lines:[0, 0, 0, 1, 1, 0]},
  {so:31,name:`Hoả Thiên Đại Hữu`,dong1:`Khoan dã. CẢ CÓ.`,chiTuong:`Kim ngọc mãn đường chi tượng: vàng bạc đầy nhà.`,tuKhoa:`Có nhiều, thong dong, dung dưỡng nhiều. Độ lượng rộng, có đức dầy, chiếu sáng lớn. Có nhiều, dung chở lớn, rộng khắp , khoan thai, chói chang, giàu có.`,lines:[1, 1, 1, 1, 0, 1]},
  {so:32,name:`Hoả Trạch Khuể`,dong1:`Quai dã. HỖ TRỢ.`,chiTuong:`Hồ giả hổ oai chi tượng: con hồ nhờ oai con hổ.`,tuKhoa:`Trái lìa, lìa xa, hai bên lợi dụng lẫn nhau, cơ biến quai xảo, như cung tên, súng đạn. Hỗ trợ, trái lìa, lìa xa, hai bên lợi dụng lẫn nhau, quyền biến cậy thế, giả dối, khoe khoang không thật.`,lines:[1, 1, 0, 1, 0, 1]},
  {so:33,name:`Thuần Ly`,dong1:`Lệ dã. NÓNG SÁNG.`,chiTuong:`Môn hộ bất ninh chi tượng: tượng nhà cửa không yên.`,tuKhoa:`Sáng sủa, trống trải, trống trơn, toả ra, bám vào, phụ bám, phô trương ra ngoài. Bung toả, phụ bám vào, nóng sáng, ngoài cứng trong mềm, phô trương, nóng vội, nóng lòng, bất an, cháy, rọi, soi sáng, thấy rõ, binh lửa, chiến tranh, văn chữ.`,lines:[1, 0, 1, 1, 0, 1]},
  {so:34,name:`Hoả Lôi Phệ Hạp`,dong1:`Khiết dã. CẮN HỢP.`,chiTuong:`Uỷ mị bất chấn chi tượng: tượng yếu đuối không chạy được.`,tuKhoa:`Cẩu hợp, bấu vấu, vặn vẹo, nhai, bấu quào, dày xéo, đay nghiến, phỏng vấn, hỏi han (học hỏi). Cắn hợp, cẩu hợp, bấu quàu, cắn xé, cào cấu, nghiền nát, nghiền nhỏ, vặn vẹo, xiết chặt, mắc dính, móc ngoặc, hỏi han, đay nghiến, giày vò.`,lines:[1, 0, 0, 1, 0, 1]},
  {so:35,name:`Hoả Phong Đỉnh`,dong1:`Định dã. NUNG ĐÚC.`,chiTuong:`Luyện dược thành đan chi tượng: tượng luyện thuốc thành linh đơn.`,tuKhoa:`Đứng được, cậm đứng, trồng, nung nấu, rèn luyện, vững chắc, ước hẹn. Định, an định, định hình, cố định, đứng vững, vững chắc, đính ước, ước hẹn, đứng được, cặm đứng, trồng cấy, nung đúc, nung nấu, rèn luyện, tu hành, tân trang, làm mới, theo mới.`,lines:[0, 1, 1, 1, 0, 1]},
  {so:36,name:`Hoả Thuỷ Vị Tế`,dong1:`Thất dã. THẤT CÁCH.`,chiTuong:`Ưu trung vọng hỷ chi tượng: trong cái lo có cái mừng.`,tuKhoa:`Thất bác, mất, thất bại, dở dang, chưa xong, nửa chừng. Thất cách, thất bát, mất, dở dang, nửa chừng, chưa xong, lẫn lộn.`,lines:[0, 1, 0, 1, 0, 1]},
  {so:37,name:`Hoả Sơn Lữ`,dong1:`Khách dã. THỨ YẾU.`,chiTuong:`Ỷ nhân tác giá chi tượng: nhờ người mai mối.`,tuKhoa:`Đỗ nhờ, khách, ở đậu, tạm trú, kê vào, gá vào, ký ngụ bên ngoài, tính cách lang thang, ít người thân, không chính. Khách ngoại, lữ khách, thứ yếu, không chính, lang thang, đỗ nhờ, tạm ghé, ở đậu, kê gá vào, tựa vào, ký ngụ bên ngoài, nhờ người ngoài.`,lines:[0, 0, 1, 1, 0, 1]},
  {so:38,name:`Hoả Địa Tấn`,dong1:`Tiến dã. HIỂN HIỆN.`,chiTuong:`Long kiến trình tường chi tượng: tượng rồng hiện điềm lành.`,tuKhoa:`Đi hoặc tới, tiến tới gần, theo mực thường, lửa đã hiện trên mặt đất, ra mặt, trưng bày. Tiến tới, tiến lên, tới gần, hiển hiện, ra mặt, trưng bày, soi sáng, phía trước, theo mực thường.`,lines:[0, 0, 0, 1, 0, 1]},
  {so:41,name:`Lôi Thiên Đại Tráng`,dong1:`Chí dã. TỰ CƯỜNG.`,chiTuong:`Phượng tập đăng sơn chi tượng: phượng đậu trên núi.`,tuKhoa:`Ý riêng, bụng nghĩ, hướng thượng, ý định, vượng sức, thịnh đại, trên cao, chót vót, lên trên, chí khí, có lập trường. Có chí khí vươn lên, hướng thượng, ở trên cao, tự lớn mạnh, tự lập, tự cường, tự quyết, tự xây dựng.`,lines:[1, 1, 1, 1, 0, 0]},
  {so:42,name:`Lôi Trạch Quy Muội`,dong1:`Tai dã. XÔN XAO.`,chiTuong:`Ác quỷ vi sủng chi tượng: tượng ma quái làm rối.`,tuKhoa:`Tai nạn, rối ren, lôi thôi, chen lẫn, nữ chi chung, gái lấy chồng. Thuộc về nữ nhân, đàn bà con gái, nữ chi chung, gái lấy chồng, chen lẫn, rối ren, xôn xao, lôi thôi, ỏm tỏi, làm rối, tai nạn, tai vạ.`,lines:[1, 1, 0, 1, 0, 0]},
  {so:43,name:`Lôi Hoả Phong`,dong1:`Thịnh đại dã. HOÀ MỸ.`,chiTuong:`Chí đồng đạo hợp chi tượng: cùng đồng tâm hiệp lực.`,tuKhoa:`Thịnh đại, được mùa, nhiều người góp sức. Thịnh đại, giàu có, lớn lao, hoà mỹ, tốt đẹp, được mùa, nhiều người góp sức, bật sáng.`,lines:[1, 0, 1, 1, 0, 0]},
  {so:44,name:`Thuần Chấn`,dong1:`Động dã. ĐỘNG DỤNG.`,chiTuong:`Trùng trùng chấn kinh chi tượng: khắp cùng dấy động.`,tuKhoa:`Rung động, sợ hãi do chấn động, phấn phát, nổ vang, phấn khởi, chấn kinh, nảy mầm. Động dụng, thuận động, manh động, rung động, liên động, chuyền động, dấy động, phấn phát, nổ vang, phấn khởi bật dậy, nẩy mầm, chấn kinh, sợ hãi do chấn động, thần kinh, tâm thần, điện âm.`,lines:[1, 0, 0, 1, 0, 0]},
  {so:45,name:`Lôi Phong Hằng`,dong1:`Cửu dã. TRƯỜNG CỬU.`,chiTuong:`Trường cửu chi nghĩa chi tượng: lâu bền như đạo nghĩa.`,tuKhoa:`Lâu dài chậm chạp, đạo lâu bền như vợ chồng, kéo dài câu chuyện, thâm giao, nghĩa cố tri, xưa, cũ. Lâu dài, gắn bó, bền chặt, vững chắc, cũ xưa, như đạo vợ chồng, như đạo lý Trời Đất.`,lines:[0, 1, 1, 1, 0, 0]},
  {so:46,name:`Lôi Thuỷ Giải`,dong1:`Tán dã. NƠI NƠI.`,chiTuong:`Lôi vũ tác giải chi tượng: sấm động mưa bay.`,tuKhoa:`Làm cho tan đi như làm tan sự nguy hiểm, giải phóng, giải tán, loan truyền, phân phát, lưu thông, ban rải, ân xá. Giải tán, giải toả, giải phóng, làm cho tan đi, loan truyền, phân phát, lưu thông, ban rải, ân xá, buông thả, giải thích, nhiều mối, nơi nơi.`,lines:[0, 1, 0, 1, 0, 0]},
  {so:47,name:`Lôi Sơn Tiểu Quá`,dong1:`Hoạ dã. BẤT TÚC.`,chiTuong:`Thượng hạ truân chuyên chi tượng: trên dưới gian nan, vất vả, buồn thảm.`,tuKhoa:`Thiểu não, thiểu lý, hèn mọn, nhỏ nhặt, bẩn thỉu, thiếu cường lực. Quá ít, không đủ, quá nhỏ, hèn kém, yếu đuối, nhỏ nhặt, thiểu não, bẩn thỉu, nhỏ mọn, gian nan, vất vả, buồn thảm, nát vụn.`,lines:[0, 0, 1, 1, 0, 0]},
  {so:48,name:`Lôi Địa Dự`,dong1:`Duyệt dã. THUẬN ĐỘNG.`,chiTuong:`Thượng hạ duyệt dịch chi tượng: tượng trên dưới vui vẻ.`,tuKhoa:`Dự bị, dự phòng, canh chừng, sớm, vui vầy. Vui thuận, vui vầy, nhún nhẩy, thuận động, động trên đất, động trong âm u, canh giữ, canh chừng, dự bị, phòng bị, chuẩn bị, từng đợt, trào dâng, sáng sớm (rạng đông).`,lines:[0, 0, 0, 1, 0, 0]},
  {so:51,name:`Phong Thiên Tiểu Súc`,dong1:`Tắc dã. DỊ ĐỒNG.`,chiTuong:`Cầm sắt bất điệu chi tượng: tiếng đờn không hoà điệu.`,tuKhoa:`Bế tắc, không đồng ý nhau, cô quả, cô độc, súc oán, chứa mối oán giận, có ý trái lại, không hoà hợp, nhỏ nhen. Khác lạ, chứa ít, chen lẫn, ém cứng, không đều, lẻ loi, cô đơn, cô độc, oán hận, nhỏ nhen, phân cách, dị biệt, dị đồng.`,lines:[1, 1, 1, 0, 1, 1]},
  {so:52,name:`Phong Trạch Trung Phu`,dong1:`Tín dã. TRUNG THẬT.`,chiTuong:`Nhu tại nội nhi đắc trung chi tượng: tượng âm ở trong mà được giữ.`,tuKhoa:`TRUNG THẬT. Tín thật, không ngờ vực, có uy tín cho người tin tưởng, tín ngưỡng, ở trong. Trung thực, tín thật, không ngờ vực, có uy tín cho người tin tưởng, tín ngưỡng, đúng thật, ở trong, ở giữa, y như thiên nhiên chân dạng.`,lines:[1, 1, 0, 0, 1, 1]},
  {so:53,name:`Phong Hoả Gia Nhân`,dong1:`Đồng dã. NẨY NỞ.`,chiTuong:`Khai hoa kết tử chi tượng: trổ bông sinh trái, nẩy mầm.`,tuKhoa:`Người nhà, gia đình, cùng gia đình, đồng chủng, đồng nghiệp, cùng xóm, sinh sôi, khai thác mở mang thêm. Đồng loại, cùng một nhà, người nhà, gia tăng thêm, mở mang thêm.`,lines:[1, 0, 1, 0, 1, 1]},
  {so:54,name:`Phong Lôi Ích`,dong1:`Ích dã. TIẾN ÍCH.`,chiTuong:`Hồng hộc xung tiêu chi tượng: chim Hồng, chim Hộc bay qua mây mù.`,tuKhoa:`Thêm được lợi, giúp dùm, tiếng dội xa, vượt lên, phóng mình tới. Thêm được lợi, giúp giùm để có lợi ích chung riêng, tiến nhanh, phóng mình tới, vượt lên, tiếng dội xa, chồm lú đầu ra.`,lines:[1, 0, 0, 0, 1, 1]},
  {so:55,name:`Thuần Tốn`,dong1:`Thuận nhập dã. THUẬN NHẬP.`,chiTuong:`Âm Dương thăng giáng chi tượng: khí âm dương lên xuống giao hợp.`,tuKhoa:`Thẩm thấu, theo lên theo xuống, theo tới theo lui, có sự giấu giếm ở trong. Thuận nhập, thấm thấu, tiềm ẩn, nhập vào, nhún nhường, thuận theo, có sự giấu giếm bên trong, tới lui thăng giáng, không chủ định.`,lines:[0, 1, 1, 0, 1, 1]},
  {so:56,name:`Phong Thuỷ Hoán`,dong1:`Tán dã. LY TÁN.`,chiTuong:`Thuỷ ngộ phong tắc hoán tán chi tượng: tượng nước gặp gió thì phải tan phải chạy.`,tuKhoa:`Lan ra, tràn lan, nổi trôi, tán thất, trốn đi xa, lánh xa, thất nhân tâm, hao hớt. Ly tán, tan ra, lan ra, tràn lan, đẩy ra, lìa ra, tán thất, trốn đi xa, xa lánh, thất nhân tâm, hao hớt, nổi trôi, nhiễm độc, trúng hàn.`,lines:[0, 1, 0, 0, 1, 1]},
  {so:57,name:`Phong Sơn Tiệm`,dong1:`Tiến dã. TUẦN TỰ.`,chiTuong:`Phúc lộc đồng lâm chi tượng: Phúc lộc cùng đến.`,tuKhoa:`Từ từ, thong thả đến, lần lần, bậc thang, bò tới, chậm chạp. Đi chậm, lần dò từng bước, từng nấc, từng bậc, từ từ, lần lần, thong thả đến, tuần tự, trật tự, bò tới, nhai nhỏ nuốt vào, bậc thang nghiêng nghiêng.`,lines:[0, 0, 1, 0, 1, 1]},
  {so:58,name:`Phong Địa Quan`,dong1:`Quan dã. QUAN SÁT.`,chiTuong:`Vân bình tụ tán chi tượng: tượng bèo mây tan hợp.`,tuKhoa:`Xem xét, trông coi, cảnh tượng xem thấy, thanh tra, duyệt binh, khán trận, lướt qua, sơ qua, sơn phết, quét nhà. Lướt qua, sơ qua, qua lại, nhìn qua, ngó qua, xem xét, trông thấy, trông nom, quan sát, quan khách, thanh tra, khán trận, duyệt binh, sơn phết, quét nhà.`,lines:[0, 0, 0, 0, 1, 1]},
  {so:61,name:`Thuỷ Thiên Nhu`,dong1:`Thuận dã. TƯƠNG HỘI.`,chiTuong:`Quân tử hoan hội chi tượng: quân tử vui vẻ hội họp, ăn uống chờ thời.`,tuKhoa:`Chờ đợi vì hiểm đằng trước, thuận theo, quây quần, hội tụ, vui hội, cứu xét, chầu về. Tương hội, chờ đợi, yến tiệc, liên hoan, nghiên cứu, đàm luận, tương đắc, quây quần, hội tụ, chầu về, thuận tình, nhất trí, đồng bệnh tương lân.`,lines:[1, 1, 1, 0, 1, 0]},
  {so:62,name:`Thuỷ Trạch Tiết`,dong1:`Chỉ dã. GIẢM CHẾ.`,chiTuong:`Trạch thượng hữu thuỷ chi tượng: trên đầm có nước.`,tuKhoa:`Ngăn ngừa, tiết độ, kềm chế, giảm bớt, chừng mực, nhiều thì tràn. Giảm chế, hạn chế, giữ gìn, ngăn ngừa, chỉ định, tiết độ, kềm chế, giảm bớt, chừng mực, nhiều thì tràn.`,lines:[1, 1, 0, 0, 1, 0]},
  {so:63,name:`Thuỷ Hoả Ký Tế`,dong1:`Hợp dã. HIỆN HỢP.`,chiTuong:`Hanh tiểu giả chi tượng: việc nhỏ thì thành.`,tuKhoa:`Gặp nhau, cùng nhau, đã xong, việc xong, hiện thực, ích lợi nhỏ. Hợp cùng, thực hiện, hiện hợp, gặp nhau, cùng nhau, đã xong, việc xong, ích lợi, nhỏ.`,lines:[1, 0, 1, 0, 1, 0]},
  {so:64,name:`Thuỷ Lôi Truân`,dong1:`Nạn dã. GIAN LAO.`,chiTuong:`Tiền hung hậu kiết chi tượng: trước dữ sau lành.`,tuKhoa:`Yếu đuối, chưa đủ sức, ngần ngại, do dự, vất vả, phải nhờ sự giúp đỡ. Yếu đuối, chưa đủ sức, ngần ngại, do dự, đang gặp nguy hiểm, tai nạn, gian lao, vất vả, khốn khổ, bị kiềm hãm, chật chội, khó khăn cử động, cần phải nhờ sự giúp đỡ.`,lines:[1, 0, 0, 0, 1, 0]},
  {so:65,name:`Thuỷ Phong Tĩnh`,dong1:`Tịnh dã. TRẦM LẶNG.`,chiTuong:`Kiền Khôn sất phối chi tượng: Trời Đất phối hợp lại.`,tuKhoa:`Ở chỗ nào cứ ở yên chỗ đó, xuống sâu, vực thẳm có nước, dưới sâu, cái giếng. Yên tĩnh, yên ổn, ở một chỗ, trầm lặng, dưới sâu, vực sâu có nước, cái giếng, xuống sâu, kín đáo.`,lines:[0, 1, 1, 0, 1, 0]},
  {so:66,name:`Thuần Khảm`,dong1:`Hãm dã. HÃM HIỂM.`,chiTuong:`Khổ tận cam lai chi tượng: tượng hết khổ mới đến sướng.`,tuKhoa:`Hãm vào ở trong, xuyên sâu vào trong, đóng cửa lại, gập ghềnh, trắc trở, bắt buộc, kềm hãm, thắng. Xuyên sâu vào trong, hảm vào trong, gập ghềnh, trắc trở, bắt buộc, kềm hãm, trói buộc, nguy hiểm, độc hại, co thắt, chằng níu, nêm ém, cài đặt.`,lines:[0, 1, 0, 0, 1, 0]},
  {so:67,name:`Thuỷ Sơn Kiển`,dong1:`Nạn dã. TRỞ NGẠI.`,chiTuong:`Bất năng tiến giả chi tượng: tượng không năng đi.`,tuKhoa:`Cản ngăn, chận lại, chậm chạp, què quặt, khó khăn. Hiểm nạn, hiểm trở, chướng ngại, ngăn cản, cản trở, khập khiễng, gập ghềnh, khó đi.`,lines:[0, 0, 1, 0, 1, 0]},
  {so:68,name:`Thuỷ Địa Tỷ`,dong1:`Tư dã. CHỌN LỌC.`,chiTuong:`Khứ xàm nhiệm hiền chi tượng: bỏ nịnh dụng trung.`,tuKhoa:`Thân liền, gạn lọc, mật thiết, tư hữu riêng, trưởng đoàn, trưởng toán, chọn lựa, về một mối. Quy căn, về gốc, một mối, số một (Tỷ nhất chi khoá), đầu mối, thân liền, thân cận, mật thiết, tư riêng, chọn lọc, bè cánh.`,lines:[0, 0, 0, 0, 1, 0]},
  {so:71,name:`Sơn Thiên Đại Súc`,dong1:`Tụ dã. TÍCH TỤ.`,chiTuong:`Đồng loại hoan hội chi tượng: đồng loại hội họp vui vẻ, cục bộ.`,tuKhoa:`Chứa tụ, súc tích, lắng tụ một chỗ, dự trữ, đựng, để dành. Chứa lớn, tích tụ, tụ họp, đông đảo, đầy ắp, sức chứa, bế quan, nội lực, nội bộ.`,lines:[1, 1, 1, 0, 0, 1]},
  {so:72,name:`Sơn Trạch Tổn`,dong1:`Thất dã. TỔN HẠI.`,chiTuong:`Phòng nhân ám toán chi tượng: tượng đề phòng sự ngầm hại, hao tổn.`,tuKhoa:`Tổn thất, hao mất, thua thiệt, bớt kém, bớt phần dưới cho phần trên là tổn hại. Tổn thất, tổn hại, hao bớt, bớt dần, thưa thớt, mất mát, thua thiệt, kém bớt, bớt phần dưới cho phần trên, ngầm hại, trừ bớt, giảm đi, hao tổn.`,lines:[1, 1, 0, 0, 0, 1]},
  {so:73,name:`Sơn Hoả Bí`,dong1:`Sức dã. QUANG MINH.`,chiTuong:`Quang minh thông đạt chi tượng: sáng sủa, thấu suốt.`,tuKhoa:`Trang sức, phản chiếu, sửa sang, trang điểm, thấu suốt, nội soi, rõ ràng. Quang minh, trong suốt, thấu suốt, trang sức, trang điểm, sửa sang, sáng đẹp hơn, nội soi, phản chiếu, phụ bám vào, đánh bóng.`,lines:[1, 0, 1, 0, 0, 1]},
  {so:74,name:`Sơn Lôi Di`,dong1:`Dưỡng dã. DUNG DƯỠNG.`,chiTuong:`Phi long nhập uyên chi tượng: Rồng vào vực nghỉ ngơi.`,tuKhoa:`Chăm lo, tu bổ, càng thêm, ăn uống, bổ dưỡng, bồi dưỡng, ví như Trời nuôi muôn vật, Thánh nhân nuôi người… Nhốt vào trong, nhốt vào giữa, chu vi, chung quanh, bao bọc, dưỡng nuôi, hàm chứa, chăm lo, tu bổ, bồi đắp, ăn uống, nghỉ ngơi, nằm yên, tại chỗ.`,lines:[1, 0, 0, 0, 0, 1]},
  {so:75,name:`Sơn Phong Cổ`,dong1:`Sự dã. SỰ BIẾN.`,chiTuong:`Âm hại tương liên chi tượng: điều hại cùng có liên hệ.`,tuKhoa:`Có sự không yên trong lòng, làm ngờ vực, khua, đánh, mua chuốc cái hại, đánh trống, làm cho sợ sệt, sửa lại cái lỗi trước đã làm. Sự việc, sự cố, sự biến, khua đánh, mua chuốc cái hại, sửa chữa, thay đổi, khích động, làm cho sợ sệt, ngờ vực, không yên trong lòng.`,lines:[0, 1, 1, 0, 0, 1]},
  {so:76,name:`Sơn Thuỷ Mông`,dong1:`Muội dã. BẤT MINH.`,chiTuong:`Thiên võng tứ trương chi tượng: lưới Trời giăng bốn mặt.`,tuKhoa:`Tối tăm, mờ ám, không minh bạch, che lấp, bao trùm, phủ chụp, ngu dại, ngờ nghệch. Bất minh, tối tăm, mờ ám, che lấp, bao trùm, phủ chụp, bít bùng, mông lung, hoang vu, ngu dại, ngờ nghệch, dò dẫm.`,lines:[0, 1, 0, 0, 0, 1]},
  {so:77,name:`Thuần Cấn`,dong1:`Chỉ dã. NGƯNG NGHỈ.`,chiTuong:`Thủ cựu đãi thời chi tượng: giữ mức cũ đợi thời.`,tuKhoa:`Ngăn giữ, ở, thôi, dừng lại, đậy lại, gói ghém, ngăn cấm vừa đúng chỗ. Chỉ là ngừng, như đình chỉ, ngừng nghỉ, ngưng nghỉ, dừng lại, ngăn giữ, ngăn cấm, vừa đúng chỗ, ở, thôi, để dành, đậy lại, gói ghém, phủ chụp, nằm ngủ, đứng yên.`,lines:[0, 0, 1, 0, 0, 1]},
  {so:78,name:`Sơn Địa Bác`,dong1:`Lạc dã. TIÊU ĐIỀU.`,chiTuong:`Lục thân băng thán chi tượng: tượng bà con thân thích xa lìa nhau.`,tuKhoa:`Đẽo gọt, lột, cướp đi, không có lợi, rụng rớt, đến rồi lại đi, tản lạc, lạt lẽo nhau, xa lìa nhau, hoang vắng, buồn thảm. Đẽo gọt, rơi rụng, xa lìa, tiêu điều, buồn thảm, lạnh nhạt, úp chụp, gò nổi.`,lines:[0, 0, 0, 0, 0, 1]},
  {so:81,name:`Địa Thiên Thái`,dong1:`Thông dã. ĐIỀU HOÀ.`,chiTuong:`Thiên địa hoà xướng chi tượng: Trời Đất giao hoà.`,tuKhoa:`Thông hiểu, am tường, hiểu biết, thông suốt, quen biết, quen thuộc. Thông thương, thông đạt, thông hiểu, thông suốt, quen thuộc, quen biết, rành rẽ, điều hoà, nhịp nhàng, ăn khớp, giao thông, giao hoà.`,lines:[1, 1, 1, 0, 0, 0]},
  {so:82,name:`Địa Trạch Lâm`,dong1:`Đại dã. BAO QUẢN.`,chiTuong:`Quân tử dĩ giáo tư chi tượng: người quân tử dạy dân, che chở, bảo bọc dân vô bờ bến (dung bảo dân, vô cương).`,tuKhoa:`Lớn lên, việc lớn, cha nuôi, vú nuôi, giáo học, nhà sư, kẻ cả, dạy dân, nhà thầu, giáng lâm, giáng hạ. Lớn lên, lớn lao, đứng đầu, kẻ cả, bao che, nuôi dưỡng, dạy dỗ, bao trùm, giáng lâm, giáng hạ.`,lines:[1, 1, 0, 0, 0, 0]},
  {so:83,name:`Địa Hoả Minh Sảng`,dong1:`Thương dã. HẠI ĐAU.`,chiTuong:`Kinh cức mãn đường chi tượng: gai góc đầy đường.`,tuKhoa:`Thương tích, bịnh hoạn, đau lòng, ánh sáng bị thương. Đen tối, thương tích, hại đau, bệnh hoạn, thương lo, gánh nặng.`,lines:[1, 0, 1, 0, 0, 0]},
  {so:84,name:`Địa Lôi Phục`,dong1:`Phản dã. TÁI HỒI.`,chiTuong:`Sơn ngoại thanh sơn chi tượng: ngoài núi lại có núi nữa.`,tuKhoa:`Tái diễn, lại có, trở về, quay đầu, bên ngoài, phản phục, phục hưng, phục hồi. Tái hồi, tái diễn, quay trở lại, trở về, lật lại, lật cánh, phản phục, ẩn phục, làm phản, phục hồi, lập lại, thêm nữa, trùng phục, lớp lớp vây bên ngoài.`,lines:[1, 0, 0, 0, 0, 0]},
  {so:85,name:`Địa Phong Thăng`,dong1:`Tiến dã. TIẾN THỦ.`,chiTuong:`Phù giao trực thượng chi tượng: chòi đạp để ngoi lên trên.`,tuKhoa:`Thăng tiến, trực chỉ, tiến mau, bay lên, vọt tới trước, bay lên không trung, thăng chức, thăng hà. Bay lên không trung, tiến lên, thăng bốc, không ở, thăng tiến, trực chỉ, tiến mau, thăng chức, thăng hà, vọt lên, vọt tới trước, lơ lửng, mất gốc.`,lines:[0, 1, 1, 0, 0, 0]},
  {so:86,name:`Địa Thuỷ Sư`,dong1:`Chúng dã. CHÚNG TRỢ.`,chiTuong:`Sĩ chúng ủng tòng chi tượng: tượng chúng ủng hộ nhau.`,tuKhoa:`Đông chúng, vừa làm thầy vừa làm bạn, học hỏi lẫn nhau, níu nắm nhau qua truông, nâng đỡ. Số nhiều, đông đảo, quây quần, níu nắm, ôm ấp, giúp đỡ, ủng hộ, dính chùm, chung chạ, lôi kéo.`,lines:[0, 1, 0, 0, 0, 0]},
  {so:87,name:`Địa Sơn Khiêm`,dong1:`Thoái dã. THOÁI ẨN.`,chiTuong:`Thượng hạ mông lung chi tượng: trên dưới hoang mang.`,tuKhoa:`Khiêm tốn, khiêm từ, cáo thoái, từ giã, lui vào trong, giữ gìn nhốt vào trong, bế cửa, nội ngoại lăng nhục. Lui, ẩn, phía sau, từ chối, mất dấu, vắng bóng, nhường nhịn, nhốt vào trong, giữ gìn.`,lines:[0, 0, 1, 0, 0, 0]},
  {so:88,name:`Thuần Khôn`,dong1:`Thuận dã. NHU THUẬN.`,chiTuong:`Nhu Thuận Lợi Trinh chi tượng: mềm theo thì được tốt bền.`,tuKhoa:`Thuận lòng, mềm dẻo, theo đường mà được lợi, hoà theo lẽ, chịu lấy, chiều theo, toại chí, đạt thành. Nhu tĩnh, trống không, đứt đoạn, phụ trợ, mềm yếu, tối thấp, lạnh nhạt, chưa xong, tiềm ẩn, đi theo, hứng chịu, bình thường, nhỏ nhặt, ướt át, rời rã.`,lines:[0, 0, 0, 0, 0, 0]},
];

function shuffle(a){
  const b=[...a];
  // Use crypto for better randomness if available
  const rnd=typeof crypto!=='undefined'&&crypto.getRandomValues
    ?()=>{const arr=new Uint32Array(1);crypto.getRandomValues(arr);return arr[0]/0xFFFFFFFF;}
    :Math.random;
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(rnd()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}
function queByGroup(id){return QUE_ALL.filter(q=>Math.floor(q.so/10)===id);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function haoHTML(lines){
  const rev=[...lines].reverse();
  return '<div class="hao-wrap">'+rev.map(l=>
    l===1
      ? '<div class="hao-yang"></div>'
      : '<div class="hao-yin"><span></span><span></span></div>'
  ).join('')+'</div>';
}

function render(){
  const s=state;
  const app=document.getElementById('app');
  
  if(s.screen==='search'){app.innerHTML=renderSearch();bindSearch();return;}
  if(s.screen==='group'){app.innerHTML=renderGroup();bindGroup();return;}
  if(s.screen==='study'){app.innerHTML=renderStudy();bindStudy();return;}
  if(s.screen==='done'){app.innerHTML=renderDone();bindDone();return;}
  app.innerHTML=renderMenu();bindMenu();
}

function bindMenu(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click',()=>{
      const a=el.dataset.action;
      if(a==='search'){state.screen='search';state.searchQ='';state.searchOpen=null;}
      else{state.mode=a;state.screen='group';state.ticked=new Set();state.allRandom=false;state.groupRandom=false;}
      render();
    });
  });
}

// ── GROUP ──
function renderGroup(){
  const s=state;
  const orderedDeck=s.all64==='ordered'?[...QUE_ALL]:
    s.all64==='random'?QUE_ALL:
    s.ticked.size===0?[]:
    QUE_ALL.filter(q=>s.ticked.has(Math.floor(q.so/10)));
  const canStart=orderedDeck.length>0;
  return `<div class="screen">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:18px">
      <button class="btn-back" id="back-btn">‹</button>
      <span style="font-size:17px;font-weight:500">${s.mode==='review'?'Ôn bài':'Kiểm tra'} — Chọn nhóm</span>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:14px">
      ${['ordered','random'].map(v=>{
        const on=s.all64===v;
        return `<div data-all64="${v}" style="flex:1;padding:0.9rem 1rem;border-radius:12px;border:1.5px solid ${on?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.15)'};background:${on?'rgba(255,255,255,0.08)':'#2a2a2a'};cursor:pointer;text-align:center">
          <div style="font-size:15px;font-weight:500;margin-bottom:2px">${v==='ordered'?'Tuần tự':'Random'}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.5)">${v==='ordered'?'11 → 88':'Xáo trộn'} · 64 quẻ</div>
        </div>`;
      }).join('')}
    </div>
    <div class="groups-grid">
      ${NGOAI.map(g=>{
        const on=s.ticked.has(g.id)&&!s.allRandom;
        const queLst=queByGroup(g.id);
        return `<div class="group-item" data-gid="${g.id}" style="border:1.5px solid ${on?g.color:'rgba(255,255,255,0.12)'};background:${on?'rgba(255,255,255,0.06)':'#2a2a2a'}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:20px;color:${g.color}">${g.icon}</span>
            <span style="font-size:16px;font-weight:500">${g.name}</span>
            <span style="margin-left:auto;width:20px;height:20px;border-radius:5px;border:2px solid ${on?g.color:'rgba(255,255,255,0.55)'};background:${on?g.color:'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:#000">${on?'✓':''}</span>
          </div>
          <div style="font-size:11px;color:rgba(255,255,255,0.45);line-height:1.5">${queLst.map(q=>esc(q.name)).join(' · ')}</div>
        </div>`;
      }).join('')}
    </div>
    ${!s.allRandom&&s.ticked.size>0?`
    <div id="grandom" style="padding:0.8rem 1.25rem;border-radius:12px;border:1.5px solid ${s.groupRandom?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.12)'};background:${s.groupRandom?'rgba(255,255,255,0.07)':'#2a2a2a'};margin-bottom:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:15px;font-weight:500">Random thứ tự</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.55);margin-top:2px">${s.groupRandom?'Xáo trộn ngẫu nhiên':'Theo thứ tự 11, 12 … 81, 82 …'}</div>
      </div>
      <span class="checkbox" style="border-color:${s.groupRandom?'#fff':'rgba(255,255,255,0.3)'};background:${s.groupRandom?'#fff':'transparent'};color:#000">${s.groupRandom?'✓':''}</span>
    </div>`:''}
    <button class="btn-start" id="start-btn" style="background:${canStart?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.05)'};color:${canStart?'#fff':'rgba(255,255,255,0.25)'};cursor:${canStart?'pointer':'default'}">
      ${canStart?`Bắt đầu — ${orderedDeck.length} quẻ`:'Chọn ít nhất 1 nhóm'}
    </button>
  </div>`;
}
function bindGroup(){
  document.getElementById('back-btn').onclick=()=>{state.screen='menu';render();};
  document.querySelectorAll('[data-all64]').forEach(el=>{
    el.addEventListener('click',()=>{
      const v=el.dataset.all64;
      state.all64=state.all64===v?null:v;
      // untick all groups when selecting 64-que option
      state.ticked=new Set();
      state.groupRandom=false;
      state.allRandom=(state.all64==='random');
      render();
    });
  });
  document.querySelectorAll('[data-gid]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=parseInt(el.dataset.gid);
      // untick tuần tự/random when selecting a group
      state.all64=null;
      state.allRandom=false;
      if(state.ticked.has(id))state.ticked.delete(id);else state.ticked.add(id);
      render();
    });
  });
  const gr=document.getElementById('grandom');
  if(gr) gr.onclick=()=>{state.groupRandom=!state.groupRandom;render();};
  document.getElementById('start-btn').onclick=()=>{
    let orderedDeck;
    if(state.all64==='ordered') orderedDeck=[...QUE_ALL].sort((a,b)=>a.so-b.so);
    else if(state.all64==='random') orderedDeck=shuffle([...QUE_ALL]);
    else if(state.ticked.size>0) orderedDeck=QUE_ALL.filter(q=>state.ticked.has(Math.floor(q.so/10))).sort((a,b)=>a.so-b.so);
    else orderedDeck=[];
    if(!orderedDeck.length) return;
    const deck=(state.groupRandom&&!state.all64)?shuffle([...orderedDeck]):orderedDeck;
    state.deck=deck;state.originalDeck=[...deck];state.idx=0;state.face='front';state.revealed=false;
    state.know=0;state.dkSet=new Set();state.screen='study';render();
  };
}

// ── STUDY ──
function renderStudy(){
  const s=state;
  const q=s.deck[s.idx];
  const total=s.deck.length;
  const pct=Math.round((s.idx/total)*100);
  const isTest=s.mode==='test';

  let frontHTML='';
  if(s.face==='front'){
    const nameHidden=isTest&&!s.revealed;
    const chiHidden=isTest&&!s.revealed;
    frontHTML=`<div class="card-front">
      ${isTest?
        `<div style="font-size:26px;font-weight:500;margin-bottom:1.25rem;text-align:center;line-height:1.3;color:${nameHidden?'transparent':'#fff'};background:${nameHidden?'rgba(255,255,255,0.1)':'transparent'};border-radius:${nameHidden?'10px':'0'};padding:${nameHidden?'6px 24px':'0'};transition:all 0.2s">${esc(q.name)}</div>`
        :`<div style="font-size:26px;font-weight:500;color:#fff;margin-bottom:1.25rem;text-align:center;line-height:1.3">${esc(q.name)}</div>`
      }
      ${haoHTML(q.lines)}
      <div style="height:20px"></div>
      <div style="font-size:15px;font-style:italic;text-align:center;max-width:280px;line-height:1.65;color:${chiHidden?'rgba(255,255,255,0)':'rgba(255,255,255,0.85)'};transition:color 0.2s">${esc(q.chiTuong)}</div>
      ${chiHidden?'<div style="font-size:14px;color:rgba(255,255,255,0.75);margin-top:6px">Bấm để xem</div>':''}
    </div>`;
  } else {
    frontHTML=`<div class="card-back">
      <div style="font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:0.5rem">${esc(q.name)}</div>
      <div style="font-size:19px;font-weight:500;margin-bottom:1rem;line-height:1.4">${esc(q.dong1)}</div>
      <div style="display:flex;gap:0.7rem">
        <div style="color:rgba(255,255,255,0.55);font-size:20px;line-height:1.55;flex-shrink:0">—</div>
        <div style="font-size:17px;line-height:1.75">${esc(q.tuKhoa)}</div>
      </div>
      <div style="font-size:13px;color:rgba(255,255,255,0.7);text-align:center;margin-top:1.5rem">Vuốt trái/phải để lật · bấm thuộc/chưa để qua quẻ mới</div>
    </div>`;
  }

  return `<div class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-back" id="back-btn">‹</button>
        <span style="font-size:16px;color:rgba(255,255,255,0.5)">${s.idx+1}/${total}</span>
        <span style="font-size:12px;color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.07);padding:2px 8px;border-radius:6px">${s.mode==='review'?'ôn bài':'kiểm tra'}</span>
      </div>
      <div style="display:flex;gap:10px;font-size:14px">
        <span style="color:#5DCAA5;opacity:${s.know>0?1:0.5}">✓ ${s.know}</span>
        <span style="color:#F09595;opacity:${s.dkSet.size>0?1:0.5}">✗ ${s.dkSet.size}</span>
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="card" id="card-el">${frontHTML}</div>
    <div style="display:flex;gap:10px">
      <button class="btn-grade btn-know" id="btn-know">Thuộc rồi</button>
      <button class="btn-grade btn-dk" id="btn-dk">Chưa thuộc</button>
    </div>
  </div>`;
}
function bindStudy(){
  document.getElementById('back-btn').onclick=()=>{state.screen='group';render();};

  let touchStart=null;
  const card=document.getElementById('card-el');

  card.addEventListener('touchstart',e=>{
    touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY,t:Date.now()};
  },{passive:true});
  card.addEventListener('touchend',e=>{
    if(!touchStart) return;
    const dx=e.changedTouches[0].clientX-touchStart.x;
    const dy=e.changedTouches[0].clientY-touchStart.y;
    const dt=Date.now()-touchStart.t;
    const ts=touchStart; touchStart=null;
    if(Math.abs(dx)<12&&Math.abs(dy)<12&&dt<250){
      // TAP: toggle reveal (test only)
      if(state.mode==='test'&&state.face==='front'){state.revealed=!state.revealed;render();}
      return;
    }
    // SWIPE: flip face
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){
      state.face=state.face==='front'?'back':'front';render();
    }
  },{passive:true});

  // fallback click for non-touch (desktop)
  card.addEventListener('click',()=>{
    if(state.mode==='test'&&state.face==='front'){state.revealed=!state.revealed;render();}
  });

  function grade(know){
    const origIdx=QUE_ALL.indexOf(state.deck[state.idx]);
    if(know){state.dkSet.delete(origIdx);state.know++;}
    else state.dkSet.add(origIdx);
    if(state.idx+1>=state.deck.length){
      const knowCount=state.deck.filter(q=>!state.dkSet.has(QUE_ALL.indexOf(q))).length;
      state.doneData={knowCount,dkSet:new Set(state.dkSet)};
      state.screen='done';render();return;
    }
    state.idx++;state.face='front';state.revealed=false;render();
  }
  document.getElementById('btn-know').onclick=grade.bind(null,true);
  document.getElementById('btn-dk').onclick=grade.bind(null,false);
}

// ── DONE ──
function renderDone(){
  const{knowCount,dkSet}=state.doneData;
  const dk=dkSet.size;
  return `<div class="screen" style="text-align:center;padding-top:2.5rem">
    <div style="font-size:22px;font-weight:500;margin-bottom:0.6rem">Xong ${knowCount+dk} quẻ!</div>
    <div style="font-size:16px;color:rgba(255,255,255,0.55);margin-bottom:0.5rem">Thuộc ${knowCount} · Chưa thuộc ${dk}</div>
    ${dk>0?`<div style="font-size:15px;color:#F09595;margin-bottom:2rem">Còn ${dk} quẻ chưa thuộc</div>`:
           `<div style="font-size:15px;color:#5DCAA5;margin-bottom:2rem">Thuộc hết rồi! 🎉</div>`}
    ${dk>0?`<button class="done-btn" id="btn-review" style="border:1px solid rgba(240,149,149,0.5);background:transparent;color:#F09595">Ôn tiếp ${dk} quẻ chưa thuộc</button>`:''}
    <button class="done-btn" id="btn-restart" style="border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.7)">Ôn lại từ đầu</button>
    <button class="done-btn" id="btn-menu" style="border:none;background:transparent;color:rgba(255,255,255,0.85)">Menu</button>
  </div>`;
}
function bindDone(){
  const r=document.getElementById('btn-review');
  if(r) r.onclick=()=>{
    const dk=QUE_ALL.filter((_,i)=>state.doneData.dkSet.has(i));
    state.deck=shuffle(dk);state.idx=0;state.face='front';state.revealed=false;
    state.know=0;state.dkSet=new Set();state.screen='study';render();
  };
  document.getElementById('btn-restart').onclick=()=>{
    state.deck=shuffle([...(state.originalDeck||state.deck)]);state.idx=0;state.face='front';state.revealed=false;
    state.know=0;state.dkSet=new Set();state.screen='study';render();
  };
  document.getElementById('btn-menu').onclick=()=>{state.screen='menu';render();};
}

// ── SEARCH ──
function renderSearch(){
  const raw=state.searchQ.trim().toLowerCase();
  const q=removeDiacritics(raw);
  const res=q?QUE_ALL.filter(x=>
    removeDiacritics(x.name.toLowerCase()).includes(q)||
    String(x.so).includes(q)||
    removeDiacritics(x.dong1.toLowerCase()).includes(q)||
    removeDiacritics(x.tuKhoa.toLowerCase()).includes(q)
  ):QUE_ALL;
  return `<div class="screen">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
      <button class="btn-back" id="back-btn">‹</button>
      <input class="search-input" id="search-input" value="${esc(state.searchQ)}" placeholder="Tìm tên, số, từ khoá...">
    </div>
    <div id="results">
      ${res.map(r=>`
        <div class="search-item" data-so="${r.so}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:baseline;gap:10px">
              <span style="font-size:13px;color:rgba(255,255,255,0.5);min-width:28px">${r.so}</span>
              <span style="font-size:17px;font-weight:500">${esc(r.name)}</span>
            </div>
            <span style="font-size:13px;color:rgba(255,255,255,0.55)">${esc(r.dong1.split('. ')[1]||'')}</span>
          </div>
        </div>
      `).join('')}
      ${res.length===0?'<div style="font-size:16px;color:rgba(255,255,255,0.45);text-align:center;padding:2rem">Không tìm thấy</div>':''}
    </div>
  </div>`;
}
function showPopup(so){
  const r=QUE_ALL.find(x=>x.so===so);
  if(!r) return;
  const overlay=document.createElement('div');
  overlay.className='popup-overlay';
  overlay.innerHTML=`
    <div class="popup-sheet">
      <div class="popup-header">
        <div>
          <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:4px">${r.so}</div>
          <div style="font-size:21px;font-weight:500">${esc(r.name)}</div>
        </div>
        <button class="popup-close" id="popup-close">✕</button>
      </div>
      <div class="popup-body">
        <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:1.25rem">
          ${haoHTML(r.lines)}
          <div style="flex:1">
            <div style="font-size:17px;font-weight:500;margin-bottom:6px">${esc(r.dong1)}</div>
            <div style="font-size:14px;color:rgba(255,255,255,0.75);font-style:italic;line-height:1.65">${esc(r.chiTuong)}</div>
          </div>
        </div>
        <div style="height:1px;background:rgba(255,255,255,0.08);margin-bottom:1rem"></div>
        <div style="display:flex;gap:0.75rem">
          <div style="color:rgba(255,255,255,0.5);font-size:20px;flex-shrink:0;line-height:1.6">—</div>
          <div style="font-size:16px;line-height:1.8;color:rgba(255,255,255,0.9)">${esc(r.tuKhoa)}</div>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const close=()=>overlay.remove();
  overlay.querySelector('#popup-close').onclick=close;
  overlay.addEventListener('click',e=>{if(e.target===overlay)close();});
}

function bindSearch(){
  document.getElementById('back-btn').onclick=()=>{state.screen='menu';render();};
  const inp=document.getElementById('search-input');
  inp.focus();
  inp.addEventListener('input',()=>{state.searchQ=inp.value;render();});
  document.querySelectorAll('.search-item').forEach(el=>{
    el.addEventListener('click',()=>showPopup(parseInt(el.dataset.so)));
  });
}

function removeDiacritics(s){
  return s.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/đ/g,'d').replace(/Đ/g,'d');
}

render();
</script>

</body>
